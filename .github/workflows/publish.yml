name: Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-releases:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Create GitHub releases from merged release PRs
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish-native:
    needs: create-releases
    if: ${{ needs.create-releases.outputs.releases_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: "ferrocat-darwin-arm64"
            runner: macos-14
          - package_name: "ferrocat-linux-x64-gnu"
            runner: ubuntu-24.04
          - package_name: "ferrocat-linux-arm64-gnu"
            runner: ubuntu-24.04-arm
          - package_name: "ferrocat-win32-x64-msvc"
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
      FERROCAT_RUST_PROFILE: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native package
        run: pnpm --filter "${{ matrix.package_name }}" build

      - name: Publish native package
        run: pnpm --filter "${{ matrix.package_name }}" publish --access public --no-git-checks

  publish-js:
    needs:
      - create-releases
      - publish-native
    if: ${{ needs.create-releases.outputs.releases_created == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wrapper package
        run: pnpm --filter ferrocat build

      - name: Publish wrapper package
        run: pnpm --filter ferrocat publish --access public --no-git-checks

  publish-rust:
    needs:
      - create-releases
      - publish-js
    if: ${{ needs.create-releases.outputs.releases_created == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crate
        run: cargo publish -p ferrocat --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
