name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2025
        runtime:
          - name: node
            node_version: "22"
          - name: node
            node_version: "24"
          - name: bun
            node_version: "24"

    name: ${{ matrix.os }} / ${{ matrix.runtime.name }}${{ matrix.runtime.name == 'node' && format(' {0}', matrix.runtime.node_version) || '' }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.runtime.node_version }}

      - name: Set up Bun
        if: ${{ matrix.runtime.name == 'bun' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: pnpm fmt:rust:check

      - name: Run Clippy
        run: pnpm lint:rust

      - name: Build workspace
        run: pnpm build

      - name: Run Rust tests
        run: pnpm test:rust

      - name: Smoke test native wrapper with Node.js
        if: ${{ matrix.runtime.name == 'node' }}
        run: node ./scripts/smoke-native.mjs

      - name: Smoke test native wrapper with Bun
        if: ${{ matrix.runtime.name == 'bun' }}
        run: bun ./scripts/smoke-native.mjs
