name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-lint:
    name: Rust lint
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: pnpm fmt:rust:check

      - name: Run Clippy
        run: pnpm lint:rust

  validate:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2025
        runtime:
          - name: node
            node_version: "22"
          - name: node
            node_version: "24"
          - name: bun
            node_version: "24"

    name: ${{ matrix.os }} / ${{ matrix.runtime.name }}${{ matrix.runtime.name == 'node' && format(' {0}', matrix.runtime.node_version) || '' }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.runtime.node_version }}

      - name: Install Bun on macOS/Linux
        if: ${{ matrix.runtime.name == 'bun' && runner.os != 'Windows' }}
        shell: bash
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install Bun on Windows
        if: ${{ matrix.runtime.name == 'bun' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          powershell -c "irm bun.sh/install.ps1 | iex"
          "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Run Rust tests
        run: pnpm test:rust

      - name: Smoke test native wrapper with Node.js
        if: ${{ matrix.runtime.name == 'node' }}
        run: node ./scripts/smoke-native.mjs

      - name: Smoke test native wrapper with Bun
        if: ${{ matrix.runtime.name == 'bun' }}
        run: bun ./scripts/smoke-native.mjs
