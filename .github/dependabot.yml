      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
  - package-ecosystem: "cargo"
    directory: "/crates/ferrocat-conformance"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
  - package-ecosystem: "cargo"
