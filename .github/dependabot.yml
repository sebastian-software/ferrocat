    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
  - package-ecosystem: "cargo"
    directory: "/crates/ferrocat"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
  - package-ecosystem: "cargo"
    directory: "/crates/ferrocat-bench"
