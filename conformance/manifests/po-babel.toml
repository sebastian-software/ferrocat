suite = "po-babel"
source = "python-babel/babel"
upstream_source = "https://github.com/python-babel/babel"
upstream_ref = "master snapshot 2026-03-16"
license = "BSD-3-Clause"
scope = "Targeted PO supplement for locale and modern roundtrip edge cases."

[[cases]]
id = "babel.unknown_language_roundtrip"
capability = "roundtrip"
runner = "po_roundtrip"
expectation = "pass"
input = "babel/unknown_language.po"
expected = "babel/unknown_language.po"
upstream_source = "https://raw.githubusercontent.com/python-babel/babel/master/tests/messages/test_pofile.py"
upstream_ref = "test_pofile.py:test_unknown_language_roundtrip"

[[cases]]
id = "babel.unknown_language_header"
capability = "parse"
runner = "po_parse"
expectation = "pass"
input = "babel/unknown_language.po"
expected = "babel/unknown_language_header.expected.toml"
upstream_source = "https://raw.githubusercontent.com/python-babel/babel/master/tests/messages/test_pofile.py"
upstream_ref = "test_pofile.py:test_unknown_language_roundtrip"

[[cases]]
id = "babel.irregular_multiline_msgstr"
capability = "parse"
runner = "po_parse"
expectation = "pass"
input = "babel/irregular_multiline.po"
expected = "babel/irregular_multiline.expected.toml"
upstream_source = "https://raw.githubusercontent.com/python-babel/babel/master/tests/messages/test_pofile.py"
upstream_ref = "test_pofile.py:test_denormalize_on_msgstr_without_empty_first_line"

[[cases]]
id = "babel.enclosed_location_comment"
capability = "parse"
runner = "po_parse"
expectation = "known_gap"
input = "babel/enclosed_locations.po"
notes = "Filename isolates with spaces are not yet parsed into structured references."
upstream_source = "https://raw.githubusercontent.com/python-babel/babel/master/tests/messages/test_pofile.py"
upstream_ref = "test_pofile.py:test_extract_locations_valid_location_comment"

[[cases]]
id = "babel.enclosed_location_message"
capability = "parse"
runner = "po_parse"
expectation = "pass"
input = "babel/enclosed_locations.po"
expected = "babel/enclosed_locations_message.expected.toml"
upstream_source = "https://raw.githubusercontent.com/python-babel/babel/master/tests/messages/test_pofile.py"
upstream_ref = "test_pofile.py:test_extract_locations_valid_location_comment"
