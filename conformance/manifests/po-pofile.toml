suite = "po-pofile"
source = "rubenv/pofile"
upstream_source = "https://github.com/rubenv/pofile"
upstream_ref = "master snapshot 2026-03-16"
license = "MIT"
scope = "Secondary JS-oriented PO reference adapted from pofile tests."

[[cases]]
id = "pofile.multiline_parse"
capability = "parse"
runner = "po_parse"
expectation = "pass"
input = "pofile/multiline.po"
expected = "pofile/multiline.expected.toml"
upstream_source = "https://raw.githubusercontent.com/rubenv/pofile/master/test/fixtures/multi-line.po"
upstream_ref = "test/fixtures/multi-line.po + test/parse.js"

